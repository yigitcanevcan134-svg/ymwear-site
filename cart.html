<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sepet | Y&M WEAR</title>
<style>
body{margin:0;background:#050505;color:white;font-family:Arial,sans-serif}
header{background:#080808;padding:20px 8%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222}
.logo{font-size:26px;font-weight:bold;letter-spacing:4px}
a{color:white;text-decoration:none}
.container{max-width:1000px;margin:60px auto;padding:30px}
h1{text-align:center;margin-bottom:35px}
.item{display:flex;justify-content:space-between;align-items:center;background:#111;border:1px solid #222;border-radius:14px;padding:18px;margin-bottom:15px}
.price{color:#d4af37;font-weight:bold}
.total{margin-top:30px;text-align:right;font-size:28px;color:#d4af37}
button{padding:13px 28px;border:none;border-radius:30px;background:#d4af37;color:#000;font-weight:bold;cursor:pointer;margin-top:25px}
.empty{text-align:center;color:#aaa;font-size:20px}
</style>
</head>
<body>

<header>
<div class="logo">Y&M WEAR</div>
<a href="index.html">Ana Sayfa</a>
</header>

<div class="container">
<h1>Alışveriş Sepeti</h1>
<div id="cartItems"></div>
<div class="total" id="totalPrice"></div>
<button onclick="checkout()">Ödemeye Geç</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartItems = document.getElementById("cartItems");
let totalPrice = document.getElementById("totalPrice");

function renderCart(){
    cartItems.innerHTML = "";
    let total = 0;

    if(cart.length === 0){
        cartItems.innerHTML = '<p class="empty">Sepetiniz şu anda boş.</p>';
        totalPrice.innerHTML = "";
        return;
    }

    cart.forEach((item, index) => {
        total += item.price;
        cartItems.innerHTML += `
        <div class="item">
            <div>
                <strong>${item.name}</strong>
                <p class="price">${item.price} TL</p>
            </div>
            <button onclick="removeItem(${index})">Sil</button>
        </div>`;
    });

    totalPrice.innerHTML = "Toplam: " + total + " TL";
}

function removeItem(index){
    cart.splice(index,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function checkout(){
    if(cart.length === 0){
        alert("Sepetiniz boş.");
        return;
    }

    let mesaj = "Merhaba, Y&M WEAR'dan sipariş vermek istiyorum:%0A%0A";
    let toplam = 0;

    cart.forEach(item => {
        mesaj += "- " + item.name + " - " + item.price + " TL%0A";
        toplam += item.price;
    });

    mesaj += "%0A💰 Toplam: " + toplam + " TL";

    window.open("https://wa.me/905359723901?text=" + mesaj, "_blank");
}

renderCart();
</script>

</body>
</html>

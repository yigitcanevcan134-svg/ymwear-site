<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Y&M WEAR</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="admin.html">Y&M WEAR Admin</a>
    <nav><a href="index.html">Siteye Dön</a></nav>
  </header>

  <main class="admin-page">
    <h1>Ürün Yönetimi</h1>
    <div class="admin-box">
      <input id="productName" placeholder="Ürün adı" />
      <input id="productPrice" placeholder="Fiyat" type="number" />
      <input id="productImage" placeholder="Fotoğraf linki" />
      <button class="primary-btn" onclick="adminAddProduct()">Ürün Ekle</button>
    </div>

    <div class="admin-box">
      <h2>Ürünler</h2>
      <div id="adminProductList"></div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>renderAdminProducts();</script>
</body>
</html>
